<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="DevQuest  Gamify your developer journey">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="xpFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#164e63" stroke-width="0.6" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Outer frame -->
  <rect x="28" y="28" width="1144" height="364" rx="18" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.85">
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="40" y="40" width="1120" height="340" rx="14" fill="#061018" stroke="#0e7490" stroke-width="1" opacity="0.9"/>

  <!-- Corner ticks -->
  <path d="M56 56 H96 M56 56 V96" stroke="#67e8f9" stroke-width="2" fill="none"/>
  <path d="M1144 56 H1104 M1144 56 V96" stroke="#67e8f9" stroke-width="2" fill="none"/>
  <path d="M56 364 H96 M56 364 V324" stroke="#67e8f9" stroke-width="2" fill="none"/>
  <path d="M1144 364 H1104 M1144 364 V324" stroke="#67e8f9" stroke-width="2" fill="none"/>

  <!-- Sword mark -->
  <g transform="translate(600, 95)" filter="url(#glow)">
    <text text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="42" fill="#67e8f9">”</text>
    <animateTransform attributeName="transform" type="translate" values="600,95;600,88;600,95" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Title -->
  <text x="600" y="175" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="72" font-weight="700" fill="url(#titleGrad)" letter-spacing="6" filter="url(#glow)">
    DevQuest
  </text>

  <!-- Tagline with typing-ish blink -->
  <text x="600" y="220" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" fill="#94a3b8" letter-spacing="2">
    Gamify your developer journey.
  </text>
  <rect x="860" y="204" width="10" height="22" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- XP bar -->
  <text x="300" y="275" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#67e8f9">XP</text>
  <rect x="340" y="258" width="520" height="24" rx="6" fill="#0f172a" stroke="#155e75" stroke-width="1.5"/>
  <rect x="342" y="260" width="0" height="20" rx="5" fill="url(#xpFill)">
    <animate attributeName="width" values="40;480;180;400;40" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="870" y="275" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#a5f3fc">LEVEL UP</text>
  <text x="870" y="275" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#fde047" opacity="0">
    LEVEL UP
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.45;0.5;0.7;0.8;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Status chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">
    <rect x="220" y="310" width="170" height="36" rx="8" fill="#052e2b" stroke="#34d399" stroke-width="1"/>
    <text x="305" y="333" text-anchor="middle" fill="#6ee7b7">commit ’ battle</text>

    <rect x="415" y="310" width="170" height="36" rx="8" fill="#172554" stroke="#60a5fa" stroke-width="1"/>
    <text x="500" y="333" text-anchor="middle" fill="#93c5fd">push ’ siege</text>

    <rect x="610" y="310" width="170" height="36" rx="8" fill="#3b0764" stroke="#e879f9" stroke-width="1"/>
    <text x="695" y="333" text-anchor="middle" fill="#f0abfc">quest ’ reward</text>

    <rect x="805" y="310" width="170" height="36" rx="8" fill="#422006" stroke="#fbbf24" stroke-width="1"/>
    <text x="890" y="333" text-anchor="middle" fill="#fde68a">ship ’ glory</text>
  </g>

  <!-- Scanline -->
  <rect x="40" y="40" width="1120" height="8" fill="#22d3ee" opacity="0.08">
    <animate attributeName="y" values="40;372;40" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
